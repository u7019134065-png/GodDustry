mod.goddustry.displayName = [gold]God[white]Dustry
mod.goddustry.description = GodDustry is a divine-themed content pack for Mindustry. It adds a full production-to-combat chain: the Holy Dust resource and Blessed Water liquid, drills and refineries to gather and craft them, power generators for every resource, a line of holy turrets, and five holy units built and upgraded through a dedicated factory and reconstructors. Every block, item and unit is documented and wired into the tech tree, so it works as both a ready-to-play pack and a clean, heavily-commented template for your own JSON/Hjson mods.
