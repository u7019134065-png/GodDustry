block.goddustry-divine-turret.name = Божественная турель
block.goddustry-divine-turret.description = Небольшая стартовая турель, стреляющая медными снарядами или усиленными зарядами Святой Пыли.

block.goddustry-dust-forge.name = Кузница Пыли
block.goddustry-dust-forge.description = Превращает медь и энергию в Святую Пыль.

item.goddustry-holy-dust.name = Святая Пыль
item.goddustry-holy-dust.description = Сияющий золотой порошок, питающий божественные механизмы.

liquid.goddustry-blessed-water.name = Святая Вода
liquid.goddustry-blessed-water.description = Священная охлаждённая вода с мягким восстанавливающим свечением.

block.goddustry-holy-refinery.name = Святая Очистительная
block.goddustry-holy-refinery.description = Перерабатывает медь, святую воду и энергию в Святую Пыль.

block.goddustry-holy-drill-i.name = Святой Бур I
block.goddustry-holy-drill-i.description = Божественный бур, настроенный на руды 3-го уровня.

block.goddustry-holy-drill-ii.name = Святой Бур II
block.goddustry-holy-drill-ii.description = Улучшенный бур, пробивающий более плотные руды.

block.goddustry-holy-drill-iii.name = Святой Бур III
block.goddustry-holy-drill-iii.description = Более крупный бур для продвинутой добычи ресурсов.

block.goddustry-holy-bore.name = Святое Сверло
block.goddustry-holy-bore.description = Мощное сверло, потребляющее святую воду для повышенной производительности.

block.goddustry-holy-quarry.name = Святой Карьер
block.goddustry-holy-quarry.description = Огромный бур, вгрызающийся в самые твёрдые рудные жилы.

block.goddustry-dust-reactor.name = Реактор Пыли
block.goddustry-dust-reactor.description = Сжигает Святую Пыль, вырабатывая стабильную энергию.

block.goddustry-blessed-turbine.name = Святая Турбина
block.goddustry-blessed-turbine.description = Преобразует святую воду в энергию.

block.goddustry-holy-panel.name = Святая Панель
block.goddustry-holy-panel.description = Солнечная панель со скромной божественной отдачей.

block.goddustry-hallowed-mortar.name = Освящённая Мортира
block.goddustry-hallowed-mortar.description = Запускает тяжёлые снаряды по высокой дуге.

block.goddustry-sanctifier.name = Освятитель
block.goddustry-sanctifier.description = Энергетическая турель, выжигающая цели святым светом.

block.goddustry-radiant-cannon.name = Лучезарная Пушка
block.goddustry-radiant-cannon.description = Крупная пушка, обращающая элитные боеприпасы в разрушение.

block.goddustry-aegis-array.name = Эгида
block.goddustry-aegis-array.description = Быстрая оборонительная турель для воздушных и наземных целей.

block.goddustry-holy-t1-shields.name = Святые Щиты Т1
block.goddustry-holy-t1-shields.description = Производит юнитов Святой Разведчик и Святой Страж.

block.goddustry-holy-ascender.name = Святой Возвыситель
block.goddustry-holy-ascender.description = Улучшает базовых святых юнитов до более сильных форм.

block.goddustry-holy-transcender.name = Святой Вознёсший
block.goddustry-holy-transcender.description = Финальное вознесение линии Святого Хранителя.

unit.goddustry-holy-scout.name = Святой Разведчик
unit.goddustry-holy-scout.description = Быстрый летающий разведчик с лёгким лучевым оружием.

unit.goddustry-holy-guard.name = Святой Страж
unit.goddustry-holy-guard.description = Прочный мех, защищающий передовую линию.

unit.goddustry-holy-warden.name = Святой Хранитель
unit.goddustry-holy-warden.description = Более тяжёлый мех с усиленным божественным оружием.

unit.goddustry-holy-seraph.name = Святой Серафим
unit.goddustry-holy-seraph.description = Высокоуровневый летающий атакующий, наносящий мощные удары сверху.

unit.goddustry-holy-templar.name = Святой Тамплиер
unit.goddustry-holy-templar.description = Элитный наземный юнит для продолжительных штурмов.
